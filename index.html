<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Quickbaum's Lea</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:monospace;color:#cdb;}
  #c{display:block;width:100vw;height:100vh;image-rendering:pixelated;cursor:crosshair;}
  #hud{position:fixed;left:8px;top:8px;font-size:12px;line-height:1.5;
       text-shadow:1px 1px 0 #000;pointer-events:none;opacity:.85;}
  #cross{position:fixed;left:50%;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;
         pointer-events:none;opacity:.6;}
  #cross:before,#cross:after{content:"";position:absolute;background:#fff;}
  #cross:before{left:4px;top:0;width:2px;height:10px;}
  #cross:after{top:4px;left:0;height:2px;width:10px;}
  #map{position:fixed;right:10px;bottom:10px;width:160px;height:160px;
       image-rendering:pixelated;border:2px solid #000;
       border: 10px solid;
       border-image: url('thin_dark_frame.png') 10 round;
       padding: 0px;
  }
  #start{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
         cursor:pointer;text-align:center;overflow:hidden;
         background:rgb(0 19 11);}     /* semitransparent dark-green tint over the paused world */
  #start .splash-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
  #start .logo{width:min(60vw,640px);height:auto;filter:drop-shadow(0 6px 18px #000c);
         margin-bottom:22px;animation:logoIn .8s cubic-bezier(.22,1,.36,1) both;}
  @keyframes logoIn{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
  #start .tagline{font-family:Georgia,serif;font-style:italic;color:#dccfa0;
         font-size:32px;letter-spacing:.5px;margin:0 0 18px;text-shadow:0 2px 6px #000,0 0 12px #000;}
  #start .enter{font-size:24px;letter-spacing:2px;opacity:1;margin:0 0 6px;
         text-shadow:0 2px 6px #000;animation:pulse 2s ease-in-out infinite; font-weight: bold;}
  #start .controls{opacity:.7;font-size:12px;margin:0;text-shadow:0 1px 4px #000;}
  @keyframes pulse{0%,100%{opacity:.85;}50%{opacity:.4;}}
  /* loading bar — replaces CLICK TO ENTER while the world warms up */
  #loading-status{margin-top:8px;width:min(280px,65vw);text-align:center;}
  #loading-label{font-size:12px;color:#9ab87f;letter-spacing:1px;margin:0 0 8px;
         text-shadow:0 1px 3px #000;opacity:.85;}
  #loading-track{height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;}
  #loading-fill{height:100%;background:#9ab87f;border-radius:2px;width:0%;
         transition:width .35s ease;}
  #loading-status.done{opacity:0;transition:opacity .4s ease;pointer-events:none;}
  /* settings: gear button + sound panel */
  #gear{position:fixed;right:10px;top:10px;z-index:30;width:34px;height:34px;
        background:rgba(0,19,11,.7);color:#dccfa0;border:1px solid #5a6b50;border-radius:4px;
        font-size:18px;line-height:1;cursor:pointer;opacity:.7;}
  #gear:hover{opacity:1;}
  #settings{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;
            background:rgba(0,12,7,.66);}
  #settings .panel{background:rgb(0 19 11);border:1px solid #5a6b50;border-radius:6px;
            box-shadow:0 10px 40px #000b;padding:26px 30px;min-width:320px;color:#dccfa0;}
  #settings h2{font-family:Georgia,serif;font-style:italic;margin:0 0 18px;font-size:24px;letter-spacing:.5px;}
  #settings .row{display:flex;align-items:center;gap:12px;margin:16px 0;}
  #settings .row label{flex:0 0 86px;font-size:14px;letter-spacing:1px;}
  #settings .row input[type=range]{flex:1;accent-color:#9ab87f;}
  #settings .row .val{flex:0 0 42px;text-align:right;font-size:13px;opacity:.8;}
  #settings .done{margin-top:22px;width:100%;background:#2a3a26;color:#dccfa0;border:1px solid #5a6b50;
            border-radius:4px;padding:9px;font-size:14px;letter-spacing:2px;cursor:pointer;font-family:monospace;}
  #settings .done:hover{background:#34492e;}
  .hide{display:none!important;}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="cross"></div>
<div id="hud"></div>
<canvas id="map" width="128" height="128"></canvas>
<div id="start">
  <div class="splash-content">
    <img class="logo" src="qbworld.png" alt="Quickbaum's Lea">
    <p class="tagline">A FAEREAN DRAMA<br>IN SEVEN FITS</p>
    <div id="loading-status">
      <p id="loading-label">preparing the world&hellip;</p>
      <div id="loading-track"><div id="loading-fill"></div></div>
    </div>
    <p class="enter hide" id="enter-text">CLICK TO ENTER</p>
    <p class="controls hide" id="controls-text">WASD move &middot; mouse look &middot; shift run &middot; E talk &middot; O sound &middot; esc release</p>
  </div>
</div>
<button id="gear" title="Sound settings (O)">⚙</button>
<div id="settings" class="hide">
  <div class="panel">
    <h2>Sound</h2>
    <div class="row"><label for="vol-music">MUSIC</label>
      <input type="range" id="vol-music" min="0" max="100" step="1"><span class="val" id="vol-music-val">50%</span></div>
    <div class="row"><label for="vol-sfx">EFFECTS</label>
      <input type="range" id="vol-sfx" min="0" max="100" step="1"><span class="val" id="vol-sfx-val">100%</span></div>
    <button class="done" id="settings-done">DONE</button>
  </div>
</div>
<script>window.LEAVES_CONFIG = { target: '#start', opacity: 0.9, density: 100 };</script>
<script src="js/leaves.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
